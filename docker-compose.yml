services:
  api:
    build: .
    container_name: classmate-api
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - classmate-network

  db:
    image: postgres:15-alpine
    container_name: classmate-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: classmate
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - classmate-network

networks:
  classmate-network:
    driver: bridge

volumes:
  postgres_data:
